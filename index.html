<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>novora — 探索制造与创新的边界</title>
<style>
  :root {
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --text: #1F2937;
    --muted: #6B7280;
    --faint: #9CA3AF;
    --accent: #0F2747;
    --accent-l: #1A3F6E;
    --tag-bg: #EEF3F9;
    --tag-text: #1A3F6E;
    --pill-bg: #FFFFFF;
    --pill-active-bg: #0F2747;
    --pill-active-text: #FFFFFF;
    --pill-text: #6B7280;
    --pill-hover-bg: #F3F4F6;
    --divider: #E5E7EB;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 17px; line-height: 1.8; color: var(--text);
    background: var(--bg); padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; }

  /* ── Compact Header ── */
  .site-header {
    text-align: center; padding: 36px 0 8px;
  }
  .site-logo {
    font-size: 32px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.8px; line-height: 1;
  }
  .site-title {
    font-size: 15px; font-weight: 500; color: var(--text);
    margin-top: 12px; letter-spacing: 0.3px;
  }
  .site-sub {
    font-size: 13px; color: var(--muted); margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .site-stats {
    font-size: 13px; color: var(--faint); margin-top: 10px;
    letter-spacing: 0.2px;
  }
  .site-stats .sep { color: #D1D5DB; margin: 0 4px; }
  .header-divider {
    width: 40px; height: 2px; background: var(--accent);
    margin: 18px auto 0; border-radius: 1px;
  }

  /* ── Category Nav ── */
  .cat-nav {
    display: flex; justify-content: center; gap: 6px;
    margin: 16px 0 28px; flex-wrap: wrap;
  }
  .cat-pill {
    font-size: 13px; font-weight: 500; padding: 5px 16px;
    border-radius: 16px; border: 1px solid transparent;
    cursor: pointer; transition: all 0.15s;
    background: var(--pill-bg); color: var(--pill-text);
    white-space: nowrap; user-select: none;
  }
  .cat-pill:hover { background: var(--pill-hover-bg); }
  .cat-pill.active {
    background: var(--pill-active-bg); color: var(--pill-active-text);
    border-color: var(--pill-active-bg);
  }

  /* ── Article Cards ── */
  .article-card {
    background: var(--card); border: 1px solid transparent;
    border-radius: 20px; padding: 28px 32px; margin-bottom: 14px;
    cursor: pointer; transition: all 0.2s ease;
    display: block; text-decoration: none; color: inherit;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .article-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .article-card.hidden { display: none; }
  .article-card .meta {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .article-card .date {
    font-size: 14px; color: var(--faint); font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .article-card .tags {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .article-card .tag {
    font-size: 12px; padding: 2px 10px;
    background: var(--tag-bg); color: var(--tag-text);
    border-radius: 4px; font-weight: 500;
  }
  .article-card h2 {
    font-size: 22px; font-weight: 700; line-height: 1.4;
    margin-bottom: 8px; color: var(--accent);
  }
  .article-card p {
    font-size: 15px; color: var(--muted); line-height: 1.7;
  }

  /* ── Footer ── */
  .site-footer {
    text-align: center; padding: 48px 0 32px;
    color: var(--faint); font-size: 13px;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    body { padding: 12px; font-size: 16px; }
    .site-header { padding: 28px 0 6px; }
    .site-logo { font-size: 28px; }
    .site-title { font-size: 14px; }
    .cat-nav {
      justify-content: flex-start; flex-wrap: nowrap;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 4px; margin-left: -4px; margin-right: -4px;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-pill { flex-shrink: 0; }
    .article-card { padding: 20px 18px; border-radius: 16px; }
    .article-card h2 { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ═══ Compact Header ═══ -->
  <header class="site-header">
    <div class="site-logo">novora</div>
    <div class="site-title">探索制造与创新的边界</div>
    <div class="site-sub">包装 · 材料 · AI · 可持续发展</div>
    <div class="site-stats" id="site-stats"></div>
    <div class="header-divider"></div>
  </header>

  <!-- ═══ Category Nav ═══ -->
  <nav class="cat-nav" id="cat-nav"></nav>

  <!-- ═══ Article List ═══ -->
  <div id="article-list"></div>

  <!-- ═══ Footer ═══ -->
  <footer class="site-footer">
    novora — 产业知识库 · 包装与材料 · AI与可持续发展
  </footer>

</div>

<script>
  // ── Article Database ──
  const articles = [
    {
      title: "色母粒的分散性：为什么它决定了你产品的成败",
      date: "2026-06-08",
      summary: "因色母粒分散不良导致的质量问题占客诉60%以上。从颜料选择到分散剂配方到加工工艺，一文讲透分散性的四大关键因素，附三种实用检测方法。",
      tags: ["材料", "制造"],
      file: "articles/2026-06-08-dispersion.html"
    },
    {
      title: "色母粒销售技巧与叙事体系",
      date: "2026-06-07",
      summary: "11章完整弹药库：从核心叙事框架到30条异议处理，从10个场景化故事到30个短视频标题库。不是卖色母粒，而是解决塑料企业的生产问题。",
      tags: ["销售", "材料"],
      file: "articles/sales-skills.html"
    },
    {
      title: "世界文学名著典藏 · 280部导读",
      date: "2026-06-07",
      summary: "17卷分卷：从古希腊荷马史诗到现代经典，涵盖英国、法国、俄国、德国、意大利、拉美、亚洲等全球文学。每本含中英书名、作者、导读与免费阅读链接。",
      tags: ["阅读"],
      file: "articles/classics.html"
    },
    {
      title: "色母粒到底是什么？一分钟搞懂",
      date: "2026-06-07",
      summary: "从零开始的色母粒科普：为什么不用色粉直接染色？色母粒和色粉的本质区别是什么？一文讲清楚。",
      tags: ["材料", "制造"],
      file: "articles/what-is-masterbatch.html"
    },
    {
      title: "瓶子发黄怎么办？塑料厂急诊室",
      date: "2026-06-07",
      summary: "PET瓶发黄、注塑件黑点、吹塑件破裂——这些看似不同的质量问题，往往指向同一个幕后黑手。完整诊断框架与解决方案。",
      tags: ["材料", "制造"],
      file: "articles/yellow-bottles.html"
    },
    {
      title: "为什么低价色母粒最后反而更贵？",
      date: "2026-06-07",
      summary: "三组算账对比：便宜色母粒VS高品质色母粒，添加量、不良率、停机率——真正的省钱是什么？",
      tags: ["材料", "制造"],
      file: "articles/cheap-masterbatch.html"
    },
    {
      title: "一个配方，一年帮客户省了120万",
      date: "2026-06-07",
      summary: "真实案例：添加量从4%优化到2.5%效果不变。色母粒不是越便宜越好——关键是综合成本。五维度成本拆解。",
      tags: ["材料", "制造"],
      file: "articles/roi-120wan.html"
    },
    {
      title: "10万只瓶子报废，只因为颜色差了0.5%",
      date: "2026-06-07",
      summary: "客户验货当天，10万只瓶子直接退货。问题竟然出在色母粒添加比例上。塑料行业最贵的不是色母粒，而是返工。",
      tags: ["材料", "制造"],
      file: "articles/bottles-100k.html"
    },
    {
      title: "Silgan Dispensing 深度调研报告",
      date: "2026-05-16",
      summary: "西尔格分配系统全球最完整深度分析。14页覆盖：集团架构与三大事业部、中国市场28年深耕、5笔重大收购、五年财务全景、核心技术平台。",
      tags: ["包装", "制造"],
      file: "articles/silgan-dispensing.html"
    }
  ];

  // ── Dynamic Stats ──
  const topicSet = new Set();
  articles.forEach(a => a.tags.forEach(t => topicSet.add(t)));
  document.getElementById('site-stats').innerHTML =
    articles.length + '篇文章' +
    '<span class="sep">·</span>' +
    topicSet.size + '个专题' +
    '<span class="sep">·</span>' +
    '持续更新';

  // ── Category System ──
  const categories = ['全部文章', '包装', '材料', '制造', 'AI', '可持续发展', '销售', '管理'];
  const catNav = document.getElementById('cat-nav');

  // Per-category counts
  const catCounts = {};
  categories.forEach(c => { catCounts[c] = 0; });
  articles.forEach(a => {
    catCounts['全部文章']++;
    a.tags.forEach(t => {
      if (categories.includes(t)) catCounts[t]++;
    });
  });

  let activeCat = '全部文章';

  function renderCategories() {
    const visible = categories.filter(c => catCounts[c] > 0 || c === '全部文章');
    catNav.innerHTML = visible.map(c => {
      const cls = c === activeCat ? ' active' : '';
      return '<span class="cat-pill' + cls + '" data-cat="' + c + '">' + c + '</span>';
    }).join('');
    catNav.querySelectorAll('.cat-pill').forEach(p => {
      p.addEventListener('click', function() {
        activeCat = this.getAttribute('data-cat');
        renderCategories();
        filterArticles();
      });
    });
  }

  function filterArticles() {
    document.querySelectorAll('.article-card').forEach(card => {
      if (activeCat === '全部文章') { card.classList.remove('hidden'); return; }
      const tags = card.getAttribute('data-tags').split(',');
      card.classList.toggle('hidden', !tags.some(t => t.trim() === activeCat));
    });
  }

  // ── Render Articles ──
  const list = document.getElementById('article-list');
  articles.forEach(a => {
    const card = document.createElement('a');
    card.className = 'article-card';
    card.href = a.file;
    card.setAttribute('data-tags', a.tags.join(','));
    card.innerHTML =
      '<div class="meta">' +
        '<span class="date">' + a.date + '</span>' +
        '<span class="tags">' +
          a.tags.map(t => '<span class="tag">' + t + '</span>').join('') +
        '</span>' +
      '</div>' +
      '<h2>' + a.title + '</h2>' +
      '<p>' + a.summary + '</p>';
    list.appendChild(card);
  });

  renderCategories();
</script>

</body>
</html>
